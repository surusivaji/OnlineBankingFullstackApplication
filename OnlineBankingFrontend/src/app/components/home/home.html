<div class="container-fluid">
    <div class="col-md-12">
        <h1 class="text-center heading">Online Banking Application</h1>
    </div>
    <div class="d-flex mt-3">
        <div class="col-md-2">
            <mat-form-field appearance="outline" class="w-100">
                <mat-label>Search account here</mat-label>
                <input matInput type="text" [(ngModel)]="filter" (keyup)="searchAccounts()" placeholder="Search account here">
            </mat-form-field>
        </div>
        <div class="col-md-8"></div>
        <div class="col-md-2 text-end">
            <button mat-flat-button (click)="addAccount()">Add Account</button>
        </div>
    </div>
    <div class="col-md-12">
        <table mat-table [dataSource]="dataSource" class="mat-elevation-z8">
            <ng-container matColumnDef="accountNumber">
                <th mat-header-cell *matHeaderCellDef> Id. </th>
                <td mat-cell *matCellDef="let account"> {{account.accountNumber}} </td>
            </ng-container>
            <ng-container matColumnDef="accountHolderName">
                <th mat-header-cell *matHeaderCellDef> Name </th>
                <td mat-cell *matCellDef="let account"> {{account.accountHolderName}} </td>
            </ng-container>
            <ng-container matColumnDef="email">
                <th mat-header-cell *matHeaderCellDef> Email </th>
                <td mat-cell *matCellDef="let account"> {{account.email}} </td>
            </ng-container>
            <ng-container matColumnDef="mobileNumber">
                <th mat-header-cell *matHeaderCellDef> Mobile Number </th>
                <td mat-cell *matCellDef="let account"> {{account.mobileNumber}} </td>
            </ng-container>
             <ng-container matColumnDef="accountBalance">
                <th mat-header-cell *matHeaderCellDef> Account Balance </th>
                <td mat-cell *matCellDef="let account"> {{account.accountBalance}} </td>
            </ng-container>
            <ng-container matColumnDef="actions">
                <th mat-header-cell *matHeaderCellDef> Action </th>
                <td mat-cell *matCellDef="let account">
                    <button mat-flat-button class="me-2" (click)="withdrawMoney(account.accountNumber)">Withdraw</button>
                    <button mat-flat-button class="me-2" (click)="depositMoney(account.accountNumber)">Deposit</button>
                    <button mat-flat-button class="me-2" (click)="editAccount(account)">Edit</button>
                    <button mat-flat-button class="me-2" (click)="deleteAccount(account.accountNumber)">Delete</button>
                </td>
            </ng-container>
            <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
            <tr mat-row *matRowDef="let accounts; columns: displayedColumns;"></tr>
        </table>
        <mat-paginator [pageSizeOptions]="[8, 16, 24, 32]" class="mt-3"
                showFirstLastButtons
                aria-label="Select page of periodic elements">
       </mat-paginator>
    </div>
</div>
