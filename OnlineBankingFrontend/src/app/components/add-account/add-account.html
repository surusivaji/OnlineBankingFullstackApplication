<mat-dialog-content class="container-fluid p-0">
    <mat-toolbar class="p-2">
        <span class="fs-4 fw-bold text-danger">Create Account</span>
        <span class="spacer"></span>
        <span mat-dialog-close="true">
            <button mat-dialog-close="close" matButton><mat-icon>close</mat-icon></button>
        </span>
    </mat-toolbar>
    <mat-divider></mat-divider>
    <div class="container mt-3">
        <form [formGroup]="createAccountForm">
            <div class="row">
                <div class="col-md-12">
                    <mat-form-field appearance="outline" class="inputField">
                        <mat-label>Full Name</mat-label>
                        <input type="text" matInput formControlName="fullName">
                    </mat-form-field>
                </div>
            </div>
            <div class="row">
                <div class="col-md-12">
                    <mat-form-field appearance="outline" class="inputField">
                        <mat-label>Email</mat-label>
                        <input type="email" matInput formControlName="email">
                    </mat-form-field>
                </div>
            </div>
            <div class="row">
                <div class="col-md-12">
                    <mat-form-field appearance="outline" class="inputField">
                        <mat-label>Mobile Number</mat-label>
                        <input type="text" matInput formControlName="mobileNumber">
                    </mat-form-field>
                </div>
            </div>
            <div class="row">
                <div class="col-md-12">
                    <mat-form-field appearance="outline" class="inputField">
                        <mat-label>Account Balance</mat-label>
                        <input type="number" matInput formControlName="accountBalance">
                    </mat-form-field>
                </div>
            </div>
            <div class="d-flex justify-content-center mb-3">
                <button mat-flat-button (click)="saveAccountInformation()">Submit</button>
            </div>
        </form>
    </div>
</mat-dialog-content>
