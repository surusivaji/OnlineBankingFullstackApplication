<mat-dialog-content class="container-fluid p-0">
    <h4 class="my-4 ms-3">Are you sure? <br>
        you want to delete this account?</h4>
    <mat-divider></mat-divider>
    <div class="text-end m-3">
        <button mat-dialog-close="true" mat-button class="me-1" style="background-color: blue; color: white">Cancel</button>
        <button mat-flat-button style="background-color: red; color: white;" (click)="deleteAccountInformation()">Delete</button>
    </div>
</mat-dialog-content>
